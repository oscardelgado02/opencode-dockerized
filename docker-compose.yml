services:
  opencode:
    build:
      context: .
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
        NODE_VERSION: ${NODE_VERSION:-alpine}
        PNPM_VERSION: ${PNPM_VERSION:-latest}
        OPENCODE_VERSION: ${OPENCODE_VERSION:-latest}
    image: safe-opencode
    volumes:
      - opencode-config:/home/coder/.config/opencode
      - opencode-auth:/home/coder/.local/share/opencode
      - opencode-cache:/home/coder/.cache/opencode
    extra_hosts:
      - "model-runner.docker.internal:host-gateway"
    env_file:
      - ${ENV_FILE:-.env}
    environment:
      - OPENCODE_PERMISSION_READ=${OPENCODE_PERMISSION_READ:-ask}
      - OPENCODE_PERMISSION_EDIT=${OPENCODE_PERMISSION_EDIT:-ask}
      - OPENCODE_PERMISSION_BASH=${OPENCODE_PERMISSION_BASH:-ask}
      - OPENCODE_PERMISSION_GLOB=${OPENCODE_PERMISSION_GLOB:-ask}
      - OPENCODE_PERMISSION_GREP=${OPENCODE_PERMISSION_GREP:-ask}
      - OPENCODE_PERMISSION_LIST=${OPENCODE_PERMISSION_LIST:-ask}
      - OPENCODE_PERMISSION_WEBFETCH=${OPENCODE_PERMISSION_WEBFETCH:-ask}
      - OPENCODE_PERMISSION_WEBSEARCH=${OPENCODE_PERMISSION_WEBSEARCH:-ask}
      - OPENCODE_PERMISSION_TASK=${OPENCODE_PERMISSION_TASK:-ask}
      - OPENCODE_PERMISSION_EXTERNAL_DIRECTORY=${OPENCODE_PERMISSION_EXTERNAL_DIRECTORY:-ask}
      - OPENCODE_MODEL=${OPENCODE_MODEL:-}
      - OPENCODE_LOCAL_MODEL_URL=${OPENCODE_LOCAL_MODEL_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}

volumes:
  opencode-config:
  opencode-auth:
  opencode-cache:
